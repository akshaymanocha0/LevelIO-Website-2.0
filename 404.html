<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | Level IO Studios</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/png" href="Images/logo-symbol.png" />
  <style>
    .error-section {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      background: var(--bg-primary);
      position: relative;
      overflow: hidden;
    }
    .error-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(6,182,212,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(6,182,212,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
    }
    .error-content { position: relative; z-index: 2; max-width: 520px; }
    .error-code {
      font-size: clamp(6rem, 20vw, 10rem);
      font-family: var(--font-head);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, var(--blue), var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    .error-content h2 {
      font-size: 1.5rem;
      color: #fff;
      margin-bottom: 16px;
    }
    .error-content p {
      color: var(--text-muted);
      margin-bottom: 36px;
      line-height: 1.7;
    }
    .error-actions { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
  </style>
</head>
<body>

  <!-- ═══ NAVBAR ═══ -->
  <nav class="navbar scrolled">
    <div class="container">
      <div class="nav-inner">
        <a href="index.html" class="nav-logo">
          <img src="Images/logo.png" alt="Level IO Studios" />
        </a>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="portfolio.html">Portfolio</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="blog.html">Blog</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
        <a href="contact.html" class="btn btn-primary nav-cta">Get a Quote</a>
      </div>
    </div>
  </nav>

  <!-- ═══ 404 ═══ -->
  <section class="error-section">
    <div class="error-grid"></div>
    <div class="error-content">
      <div class="error-code">404</div>
      <h2>Respawn Point Not Found</h2>
      <p>Looks like this page doesn't exist — or it got fragged. Head back to the home screen and try again.</p>
      <div class="error-actions">
        <a href="index.html" class="btn btn-primary">Back to Home</a>
        <a href="contact.html" class="btn btn-outline">Contact Us</a>
      </div>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
